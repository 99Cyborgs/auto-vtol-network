<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AVN Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <p class="eyebrow">Auto-VTOL Network</p>
        <h1>Traffic Policy Console</h1>
        <p class="lede">Deterministic replay surface for routing policy, disruption posture, and visible traffic flow.</p>
        <label class="control">
          <span>Scenario</span>
          <select id="scenario-select"></select>
        </label>
        <div class="control-row">
          <button id="play-toggle">Play</button>
          <button id="step-forward">Step</button>
        </div>
        <label class="control">
          <span>Time</span>
          <input id="timeline" type="range" min="0" max="0" value="0" />
        </label>
        <div id="summary" class="panel summary-panel"></div>
        <div class="panel legend-panel">
          <h3>Legend</h3>
          <div id="legend" class="legend"></div>
        </div>
      </aside>
      <main class="main">
        <section class="hero panel">
          <div class="hero-copy">
            <p class="eyebrow">Replay Brief</p>
            <h2 id="scenario-name"></h2>
            <p id="scenario-description"></p>
          </div>
          <div class="hero-meta">
            <div id="policy-panel" class="policy-panel"></div>
            <div id="metric-strip" class="metric-strip"></div>
          </div>
        </section>
        <section class="status-strip">
          <div id="disruptions" class="panel status-panel"></div>
          <div id="posture" class="panel status-panel"></div>
        </section>
        <section class="grid">
          <div class="panel canvas-panel">
            <div class="canvas-header">
              <div>
                <h3>Network State</h3>
                <p>Width shows live load. Color shows open, degraded, or closed corridor posture.</p>
              </div>
              <div id="frame-note" class="frame-note"></div>
            </div>
            <svg id="network-canvas" viewBox="0 0 1000 720"></svg>
          </div>
          <div class="inspector">
            <div id="alerts" class="panel list-panel"></div>
            <div class="panel">
              <h3>Event Log</h3>
              <div id="events" class="list-panel"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
