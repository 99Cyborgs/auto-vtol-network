<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Auto-VTOL-Network hero graphic</title>
  <desc id="desc">A stylized sky scene showing a VTOL aircraft flying across a connected corridor network above a city horizon.</desc>
  <defs>
    <linearGradient id="sky" x1="160" y1="40" x2="1020" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081F3F"/>
      <stop offset="0.42" stop-color="#0F4C81"/>
      <stop offset="1" stop-color="#B9E6FF"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFD16A" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="320" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D2746"/>
      <stop offset="1" stop-color="#12395C"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#8CC9FF"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#sky)"/>

  <circle cx="976" cy="96" r="66" fill="url(#sunGlow)" filter="url(#softGlow)"/>
