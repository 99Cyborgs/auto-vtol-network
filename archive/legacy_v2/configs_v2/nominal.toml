scenario_name = "nominal_v2"
description = "Operational-model v2 baseline with reservation-aware dispatch and reroute pressure."
duration_minutes = 45
time_step_minutes = 1

[network]
nodes = "../../data/v2/bundles/reference_baseline/nodes.csv"
corridors = "../../data/v2/bundles/reference_baseline/corridors.csv"

[fleet]
vehicles = "../../data/v2/bundles/reference_baseline/vehicles.csv"

[demand]
requests = "../../data/v2/bundles/reference_baseline/demand_requests.csv"

[dispatch_policy]
max_wait_minutes = 18
max_reroutes = 2
degraded_dispatch_enabled = false
operator_delay_minutes = 2

[reservation_policy]
lookahead_minutes = 20
reservation_horizon_hops = 2
conflict_tolerance = 0

[contingency_policy]
min_energy_reserve = 18.0
reroute_buffer_minutes = 3
diversion_limit = 1

[disruptions]
events = "../../data/v2/bundles/reference_baseline/disruptions.csv"

[calibration]
enabled = true
bundle = "../../data/v2/bundles/reference_baseline/bundle.json"

[outputs]
root = "../../outputs/v2"
artifact_prefix = "avn_v2"
