experiment_name = "dispatch_conflict_experiment"
base_scenario = "nominal.toml"
output_root = "../../outputs/v2/experiments"
adaptive_refinement = true
calibration_bundle = "../../data/v2/bundles/reference_baseline/bundle.json"
calibration_gate = "required"
use_calibrated_parameters = true
promoted_metrics = ["completed_requests", "avg_delay_minutes", "diversion_count"]

[governance_policy]
minimum_confidence_tier = "medium"
fatal_blocker_categories = ["operational_breach", "fit_failure", "evidence_insufficiency"]
advisory_blocker_categories = []
waivable_categories = []

[[axes]]
name = "dispatch_policy.max_wait_minutes"
values = [12, 18]

[[axes]]
name = "reservation_policy.reservation_horizon_hops"
values = [1, 2]
